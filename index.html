<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINING PRO PREMIUM v3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- KODE IKLAN POPUNDER LAMA TELAH DIHAPUS UNTUK MENCEGAH PEMBLOKIRAN -->
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; user-select: none; }
        body { background-color: #0b0f19; color: #f1f5f9; padding-bottom: 90px; font-size: 14px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #111827; border-bottom: 1px solid #1f2937; }
        .logo-section { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .badge { background: #854d0e; color: #fef08a; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .menu-content { display: none; padding: 20px; max-width: 480px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .menu-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        h2 { font-size: 20px; margin-bottom: 15px; color: #fff; font-weight: 600; }
        h3 { font-size: 16px; color: #fff; margin-bottom: 10px; }
        .balance-card { background: #111827; padding: 25px; border-radius: 16px; text-align: center; margin-top: 10px; border: 1px solid #1f2937; }
        .balance-title { color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .balance-value { font-size: 34px; font-weight: bold; color: #3b82f6; text-shadow: 0 0 15px rgba(59,130,246,0.2); }
        .circle-container { display: flex; justify-content: center; margin-top: 35px; position: relative; }
        .mine-btn { width: 210px; height: 210px; border-radius: 50%; border: none; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px rgba(59,130,246,0.4); transition: all 0.1s ease; }
        .mine-btn:active { transform: scale(0.96); }
        .mine-btn:disabled { background: #334155 !important; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .status-text { text-align: center; margin-top: 20px; font-size: 14px; color: #94a3b8; font-weight: 500; }
        .box-item { background: #111827; padding: 16px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
        .box-info { display: flex; flex-direction: column; gap: 4px; flex: 1; padding-right: 10px; }
        .box-title { font-weight: 600; color: #f8fafc; }
        .box-desc { font-size: 12px; color: #94a3b8; line-height: 1.4; }
        .box-reward { font-size: 12px; color: #10b981; font-weight: bold; }
        .action-btn { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; font-size: 13px; white-space: nowrap; }
        .action-btn:hover { background: #2563eb; }
        .action-btn:disabled { background: #1f2937; color: #4b5563; cursor: not-allowed; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #111827; border-radius: 12px; overflow: hidden; border: 1px solid #1f2937; }
        .rank-table th, .rank-table td { padding: 12px 15px; text-align: left; }
        .rank-table th { background: #1f2937; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        .rank-table tr { border-bottom: 1px solid #1f2937; }
        .rank-table tr:last-child { border-bottom: none; }
        .rank-number { font-weight: bold; color: #3b82f6; }
        .input-field { width: 100%; background: #111827; border: 1px solid #1f2937; color: white; padding: 12px; border-radius: 8px; margin-top: 8px; margin-bottom: 15px; font-size: 14px; }
        .input-field:focus { border-color: #3b82f6; outline: none; }
        .lang-select { background: #111827; color: white; border: 1px solid #1f2937; padding: 12px; border-radius: 8px; width: 100%; font-size: 14px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111827; border-top: 1px solid #1f2937; display: flex; justify-content: space-around; padding: 8px 0; z-index: 100; }
        .nav-item { background: none; border: none; color: #64748b; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; flex: 1; transition: color 0.2s; }
        .nav-item.active { color: #3b82f6; font-weight: bold; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
    <!-- ... (Bagian header dan konten tetap sama seperti kode Anda sebelumnya) ... -->
    
    <div class="header-bar">
        <div class="logo-section">
            <div class="avatar" id="avatar-letter">M</div>
            <span style="font-weight: bold;" id="username-display">Loading...</span>
        </div>
        <div class="badge" id="user-level-badge">LV 1 Standard</div>
    </div>
    <div id="tab-home" class="menu-content active">
        <div class="balance-card">
            <div class="balance-title" data-key="wallet_bal">Saldo Dompet Anda</div>
            <div class="balance-value"><span id="saldo-display">0.000000</span> TRX</div>
        </div>
        <div class="circle-container">
            <!-- TOMBOL MINING TRIGGER SMARTLINK -->
            <button class="mine-btn" id="main-mine-btn" onclick="prosesAktivasiMiner()">TAP TO MINE</button>
        </div>
        <div class="status-text" id="miner-status">Loading Status...</div>
    </div>

    <!-- ... (Bagian konten tab lainnya tetap sama) ... -->

    <script>
        // SMART LINK ANDA
        const SMART_LINK = "https://www.effectivecpmnetwork.com/xxcgku6xp1?key=dc3eb4a4b6545d3d4a8e4570b6726108";

        // ... (Fungsi-fungsi lainnya tetap sama) ...

        function prosesAktivasiMiner() {
            // Membuka Smartlink di tab baru saat tombol ditekan
            window.open(SMART_LINK, '_blank');
            
            const statusText = document.getElementById('miner-status');
            const tombol = document.getElementById('main-mine-btn');
            const kamus = bahasaKamus[bahasaAktif];
            
            tombol.disabled = true;
            statusText.innerText = kamus.status_watching || "Mining Aktif...";
            
            // Logika durasi mining
            mulaiSesiWaktuMiner();
        }

        // ... (Sisa script Anda tetap sama) ...
    </script>
</body>
</html>
