<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Mining Pro</title>
    <style>
        :root { --primary: #f39c12; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { padding: 20px; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .btn-mine { width: 100%; padding: 20px; background: var(--primary); border: none; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>Saldo: <span id="balance">0.000000</span> TRX</div>
        <div id="lang">ID | EN</div>
    </div>

    <!-- Halaman Mining -->
    <div id="page-mining">
        <h3>Mining Status: <span id="status">Idle</span></h3>
        <button class="btn-mine" onclick="startMining()">START MINING (2 Jam)</button>
    </div>

    <!-- Halaman Deposit (Deep Link Wallet) -->
    <div id="page-deposit" class="hidden">
        <h3>Deposit Address</h3>
        <div class="card">
            <p>TRX (TRC20):</p>
            <button onclick="window.location.href='tron:TYf8H2kS9xLmPqWvZsNxBvYtRnQpWzMx4v'">Deposit TRX</button>
        </div>
        <div class="card">
            <p>BNB (BEP20):</p>
            <button onclick="window.location.href='bnb:0x71C23f40A257e84124357B7dE434823432B'">Deposit BNB</button>
        </div>
    </div>
</div>

<div class="nav">
    <div onclick="showPage('page-mining')">Mining</div>
    <div onclick="showPage('page-deposit')">Deposit</div>
    <div>Profil</div>
    <div>Rank</div>
</div>

<script>
    const WALLET_TRX_ANDA = "TYf8H2kS9xLmPqWvZsNxBvYtRnQpWzMx4v"; 
    const WALLET_BNB_ANDA = "0x71C23f40A257e84124357B7dE434823432B";

    function showPage(pageId) {
        document.querySelectorAll('.container > div:not(.header)').forEach(p => p.classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
    }

    function startMining() {
        // Memicu Smartlink Adsterra
        window.open('https://www.effectivecpmnetwork.com/xxcgku6xp1?key=dc3eb4a4b6545d3d4a8e4570b6726108', '_blank');
        
        document.getElementById('status').innerText = "Mining 2 Jam Berjalan...";
        alert("Iklan dimuat! Mining Aktif. Kembali lagi dalam 2 jam.");
    }
</script>
</body>
</html>
