<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Super App v2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle, #101026 0%, #070710 100%); color: #fff; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .header-profile { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; width: 100%; max-width: 500px; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .user-info h3 { color: #00f2fe; font-size: 15px; font-weight: 600; }
        .coin-badge { background: linear-gradient(45deg, #ffd700, #ffa500); padding: 6px 14px; border-radius: 50px; font-weight: bold; font-size: 13px; color: #000; display: flex; align-items: center; gap: 6px; }
        
        .paywall-container { background: rgba(255, 71, 87, 0.08); border: 1px solid rgba(255, 71, 87, 0.3); border-radius: 18px; width: 100%; max-width: 500px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .btn-ad { background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; font-size: 12px; }
        
        .app-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 25px; width: 100%; max-width: 500px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .nav-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 50px; gap: 5px; }
        .tab-btn { background: none; border: none; color: #a0a0ba; padding: 10px 5px; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 50px; flex: 1; text-align: center; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(45deg, #00f2fe, #4facfe); color: white; }
        
        .feature-view { display: none; }
        .feature-view.active { display: block; }
        .chat-box { height: 220px; background: rgba(0,0,0,0.4); border-radius: 14px; padding: 12px; overflow-y: auto; margin-bottom: 12px; font-size: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 14px; max-width: 85%; }
        .msg.user { background: #0070ff; align-self: flex-end; }
        .msg.bot { background: #1e293b; align-self: flex-start; border-left: 3px solid #00f2fe; }
        
        .ads-placement-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); text-align: center; }
        .native-banner-container { background: #0d111a; min-height: 120px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .btn-action { width: 100%; background: linear-gradient(45deg, #00f2fe, #4facfe); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; margin-bottom: 12px; }
    </style>
</head>
<body>

    <script type="text/javascript" src="https://pl29768997.effectivecpmnetwork.com/99/f1/b7/99f1b738acb1870269349f3c1511c9d5.js"></script>
    <script type="text/javascript" src="https://pl29760833.effectivecpmnetwork.com/d9/56/d8/d956d86955d3d835d693fbfac8693eb9.js"></script>

    <div class="header-profile">
        <div class="user-info">
            <h3>Master_Premium_User</h3>
            <p id="profId">ID: Loading...</p>
        </div>
        <div class="coin-badge"><i class="fa-solid fa-coins"></i> <span id="coinCount">5</span></div>
    </div>

    <div class="paywall-container">
        <p style="font-size: 13px; font-weight: bold;">⚡ Ambil Koin Gratis</p>
        <a href="https://www.effectivecpmnetwork.com/xxcgku6xp1?key=dc3eb4a4b6545d3d4a8e4570b6726108" target="_blank" class="btn-ad" onclick="claimAdReward()">
            <i class="fa-solid fa-film"></i> NONTON IKLAN (+2 KOIN)
        </a>
    </div>

    <div class="app-card">
        <div class="nav-tabs">
            <button id="tab-ai" class="tab-btn active" onclick="switchTab('ai-view', 'tab-ai')">AI</button>
            <button id="tab-anon" class="tab-btn" onclick="switchTab('anon-view', 'tab-anon')">Anon</button>
        </div>

        <div id="ai-view" class="feature-view active">
            <h2>AI Chat Premium</h2>
            <div class="chat-box" id="aiChatBox"><div class="msg bot">Halo! Tanyakan apa saja ke AI Premium.</div></div>
            <input type="text" id="aiInput" placeholder="Ketik pesan...">
            <button class="btn-action" id="aiBtn" onclick="sendToAINyata()">Kirim ke AI</button>
        </div>
        
        <div class="ads-placement-box">
            <div class="native-banner-container">
                <a href="https://www.effectivecpmnetwork.com/xxcgku6xp1?key=dc3eb4a4b6545d3d4a8e4570b6726108" target="_blank" style="color: #ffc107; text-decoration: none; padding: 15px;">
                    KLIK DI SINI UNTUK MENUJU HALAMAN UNDUHAN PREMIUM
                </a>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyWtGLRIgoleF9bGOzbQmG5E0BAUpFn5wxfY0_-EBR8zELElDkXiu1McwB6yxPwga-a3Q/exec";
        let coins = parseInt(localStorage.getItem('user_coins') || '5');
        
        function bukaIklanPaksa() {
            window.open("https://www.effectivecpmnetwork.com/xxcgku6xp1?key=dc3eb4a4b6545d3d4a8e4570b6726108", "_blank");
        }

        function claimAdReward() {
            coins += 2;
            localStorage.setItem('user_coins', coins);
            document.getElementById('coinCount').innerText = coins;
            alert("Terima kasih! +2 Koin!");
        }

        function switchTab(tabId, btnId) {
            document.querySelectorAll('.feature-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById(btnId).classList.add('active');
        }

        async function sendToAINyata() {
            let input = document.getElementById('aiInput');
            if (input.value === "") return;
            
            bukaIklanPaksa(); // Iklan dipicu saat tombol diklik
            
            document.getElementById('aiChatBox').innerHTML += `<div class="msg user">${input.value}</div>`;
            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: input.value })
                });
                document.getElementById('aiChatBox').innerHTML += `<div class="msg bot">Pesan terkirim ke AI.</div>`;
            } catch (e) { alert("Error koneksi."); }
            input.value = "";
        }
    </script>
</body>
                    </html>
