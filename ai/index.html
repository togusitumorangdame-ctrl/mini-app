<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Downloader</title>
    <style>
        /* Animasi latar belakang yang hidup */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Latar belakang mewah dengan gradasi bergerak */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .card {
            width: 85%;
            max-width: 400px;
            padding: 40px 30px;
            /* Efek kaca (Glassmorphism) */
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { color: #ffd700; margin-bottom: 25px; letter-spacing: 3px; font-size: 1.6rem; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #ffd700;
            background: rgba(0,0,0,0.3);
            color: white;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(to right, #ffd700, #ffaa00);
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.03); box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }

        #result { margin-top: 20px; font-size: 0.9rem; color: #ffd700; }
    </style>
</head>
<body>

    <div class="card">
        <h2>HD DOWNLOADER</h2>
        <input type="text" id="url" placeholder="Tempel link video di sini...">
        <button onclick="download()">UNDUH SEKARANG</button>
        <div id="result"></div>
    </div>

    <script>
        async function download() {
            const url = document.getElementById('url').value;
            const resDiv = document.getElementById('result');
            
            if (!url) {
                alert("Masukkan link video!");
                return;
            }

            resDiv.innerText = "Memproses video...";
            
            try {
                // API ini digunakan untuk mengambil data video tanpa watermark
                const apiUrl = `https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.video && data.video.noWatermark) {
                    resDiv.innerHTML = `<br><a href="${data.video.noWatermark}" target="_blank" style="color:#00ff00; font-weight:bold; text-decoration:none;">KLIK UNTUK DOWNLOAD HD</a>`;
                } else {
                    resDiv.innerText = "Gagal. Pastikan link adalah video TikTok yang benar.";
                }
            } catch (err) {
                resDiv.innerText = "Terjadi kesalahan. Coba lagi.";
            }
        }
    </script>
</body>
</html>
