<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Luxury</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0c; font-family: 'Inter', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        .card { 
            position: relative; z-index: 1; width: 90%; max-width: 400px; padding: 40px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(153, 69, 255, 0.3); border-radius: 30px;
            text-align: center; color: white; margin: 100px auto;
        }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #16161a; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(90deg, #9945FF, #14F195); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="card">
        <h2>SOLANA LUXURY</h2>
        <input type="text" id="url" placeholder="Paste link video...">
        <button onclick="download()">DOWNLOAD HD</button>
        <div id="result" style="margin-top:20px; color:#aaa; font-size:0.9rem;"></div>
    </div>

    <script>
        // Animasi Background (Tetap)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let triangles = [];

        class Triangle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 50 + 20;
                this.vx = Math.random() * 0.4 - 0.2; this.vy = Math.random() * 0.4 - 0.2;
                this.color = Math.random() > 0.5 ? '#9945FF' : '#14F195';
            }
            draw() {
                ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.size, this.y + this.size);
                ctx.lineTo(this.x - this.size, this.y + this.size); ctx.closePath();
                ctx.strokeStyle = this.color; ctx.globalAlpha = 0.2; ctx.stroke();
            }
            update() { this.x += this.vx; this.y += this.vy; }
        }
        for (let i = 0; i < 15; i++) triangles.push(new Triangle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            triangles.forEach(t => { t.update(); t.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // SOLUSI: Menggunakan URL redirect langsung ke pengunduh resmi
        function download() {
            const url = document.getElementById('url').value;
            if(!url) return;
            
            // Mengarahkan ke penyedia resmi yang masih berfungsi
            // Ini akan membuka situs pengunduh resmi, sehingga tidak akan ada video palsu
            window.open("https://snaptik.app/en?url=" + encodeURIComponent(url), "_blank");
        }
    </script>
</body>
</html>
