<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Super App v2.5</title>
    <script src='//libtl.com/sdk.js' data-zone='11267753' data-sdk='show_11267753'></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: radial-gradient(circle, #101026 0%, #070710 100%); color: #fff; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header-profile { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; width: 100%; max-width: 500px; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .coin-badge { background: linear-gradient(45deg, #ffd700, #ffa500); padding: 6px 14px; border-radius: 50px; font-weight: bold; font-size: 13px; color: #000; }
        .app-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 25px; width: 100%; max-width: 500px; padding: 20px; }
        .nav-tabs { display: flex; justify-content: space-between; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 50px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; color: #a0a0ba; padding: 10px 12px; font-size: 10px; cursor: pointer; border-radius: 50px; flex: 1; text-align: center; }
        .tab-btn.active { background: linear-gradient(45deg, #00f2fe, #4facfe); color: white; }
        .feature-view { display: none; }
        .feature-view.active { display: block; }
        input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; margin-bottom: 12px; }
        .btn-action { width: 100%; background: linear-gradient(45deg, #00f2fe, #4facfe); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #qrResult, #aiImageResult { width: 100%; border-radius: 14px; margin-top: 15px; display: none; background: white; padding: 10px; }
    </style>
</head>
<body>
    <div class="header-profile">
        <div><h3 id="ui_user">Master_Premium_User</h3><p id="profId"></p></div>
        <div class="coin-badge"><i class="fa-solid fa-coins"></i> <span id="coinCount">5</span></div>
    </div>

    <div class="app-card">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('ai-view', this)">Chat</button>
            <button class="tab-btn" onclick="switchTab('link-view', this)">Link</button>
            <button class="tab-btn" onclick="switchTab('img-view', this)">Img</button>
            <button class="tab-btn" onclick="switchTab('qr-view', this)">QR</button>
            <button class="tab-btn" onclick="switchTab('scam-view', this)">Shield</button>
        </div>

        <div id="ai-view" class="feature-view active">
            <input type="text" id="aiInput" placeholder="Ketik pesan...">
            <button class="btn-action" onclick="runPremiumFeature(sendToAINyata, 1)">Kirim (1 Koin)</button>
        </div>

        <div id="link-view" class="feature-view">
            <input type="text" id="longUrl" placeholder="URL panjang...">
            <button class="btn-action" onclick="runPremiumFeature(shortenLinkNyata, 5)">Shorten (5 Koin)</button>
        </div>

        <div id="img-view" class="feature-view">
            <input type="text" id="imgPrompt" placeholder="Deskripsi gambar...">
            <button class="btn-action" onclick="runPremiumFeature(generateImageNyata, 5)">Create (5 Koin)</button>
            <img id="aiImageResult" src="">
        </div>

        <div id="qr-view" class="feature-view">
            <input type="text" id="qrText" placeholder="Enter link/text for QR...">
            <button class="btn-action" onclick="runPremiumFeature(createQrCode, 5)">Generate QR (5 Koin)</button>
            <img id="qrResult" src="">
        </div>

        <div id="scam-view" class="feature-view">
            <input type="text" id="scamUrl" placeholder="URL to scan...">
            <button class="btn-action" onclick="runPremiumFeature(checkTelegramScam, 5)">Scan (5 Koin)</button>
        </div>
    </div>

    <div style="margin-top:20px; text-align:center; color:#a0a0ba; font-size:12px;">
        <p id="ui_support">Butuh bantuan? Hubungi:</p>
        <a href="https://t.me/NaburjuSidoli" style="color:#00f2fe;">@NaburjuSidoli</a>
    </div>

    <script>
        const lang = (navigator.language || '').startsWith('id') ? 'id' : 'en';
        document.getElementById('ui_user').innerText = lang === 'id' ? "Master_Premium_User" : "Premium_User";
        document.getElementById('ui_support').innerText = lang === 'id' ? "Butuh bantuan?" : "Need support?";
        document.getElementById('profId').innerText = 'ID: ' + (localStorage.getItem('user_id') || 'ID-12345');

        let coins = parseInt(localStorage.getItem('user_coins') || '5');
        function updateCoin() { localStorage.setItem('user_coins', coins); document.getElementById('coinCount').innerText = coins; }

        function runPremiumFeature(callback, cost) {
            if(coins < cost) return alert(lang === 'id' ? "Koin tidak cukup!" : "Not enough coins!");
            
            // Pesan persuasif untuk meningkatkan klik iklan
            const userClick = confirm(lang === 'id' ? 
                "Dukung pengembang dengan klik iklan untuk membuka fitur ini. Lanjut?" : 
                "Support the developer by clicking the ads to unlock this feature. Continue?");
            
            if(userClick) {
                show_11267753().then(() => {
                    coins -= cost;
                    updateCoin();
                    callback();
                });
            }
        }

        function createQrCode() {
            let text = document.getElementById('qrText').value.trim();
            if(!text) return;
            let img = document.getElementById('qrResult');
            img.src = "https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=" + encodeURIComponent(text);
            img.style.display = 'block';
        }

        function switchTab(v, btn) {
            document.querySelectorAll('.feature-view').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(v).classList.add('active');
            btn.classList.add('active');
        }

        // Fungsi logic asli Anda (sendToAINyata, shortenLinkNyata, generateImageNyata, checkTelegramScam) 
        // pastikan tetap di sini sesuai skrip lama Anda.
    </script>
</body>
</html>
