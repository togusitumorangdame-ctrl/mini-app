<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; }
        canvas { position: absolute; }
        .glass { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; padding: 30px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); text-align: center; color: white;
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="glass">
        <h3>Media Pro</h3>
        <input type="text" id="url" placeholder="Paste link video...">
        <button onclick="download()">UNDUH SEKARANG</button>
        <p id="msg"></p>
    </div>

    <script>
        // Animasi Partikel Mental-Mental
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let p = Array.from({length: 20}, () => ({x: Math.random()*c.width, y: Math.random()*c.height, vx: Math.random()*2-1, vy: Math.random()*2-1}));
        function draw() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,c.width, c.height);
            p.forEach(b => {
                b.x += b.vx; b.y += b.vy;
                if(b.x < 0 || b.x > c.width) b.vx *= -1;
                if(b.y < 0 || b.y > c.height) b.vy *= -1;
                ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Fungsi Download Langsung ke Memori
        async function handleDownload() {
    const url = document.getElementById('url').value;
    const res = document.getElementById('status');
    const API = 'https://phillips-cholesterol-platforms-big.trycloudflare.com/download?url=' + encodeURIComponent(url);

    res.innerText = "Memproses...";
    
    const response = await fetch(API);
    const data = await response.json();
    
    if(data.url) {
        res.innerText = "Mengalihkan ke unduhan...";
        // Teknik ini memaksa browser membuka file di tab baru dan browser akan otomatis menyimpan
        window.location.href = data.url; 
    } else {
        res.innerText = "Gagal memproses.";
    }
                   }
    </script>
</body>
</html>
