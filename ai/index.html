<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Solana Style</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0c; font-family: 'Inter', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        .card { 
            position: relative; z-index: 1; width: 90%; max-width: 400px; padding: 40px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(153, 69, 255, 0.3); border-radius: 30px;
            text-align: center; color: white; margin: 100px auto;
        }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #16161a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(90deg, #9945FF, #14F195); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="card">
        <h2>SOLANA LUXURY</h2>
        <input type="text" id="url" placeholder="Paste link video...">
        <button onclick="download()">DOWNLOAD HD</button>
        <div id="result" style="margin-top:20px;"></div>
    </div>

    <script>
        // Animasi Segitiga Melayang
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let triangles = [];

        class Triangle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 50 + 20;
                this.vx = Math.random() * 0.5 - 0.25;
                this.vy = Math.random() * 0.5 - 0.25;
                this.color = Math.random() > 0.5 ? '#9945FF' : '#14F195';
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.size, this.y + this.size);
                ctx.lineTo(this.x - this.size, this.y + this.size);
                ctx.closePath();
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = 0.2;
                ctx.stroke();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        for (let i = 0; i < 15; i++) triangles.push(new Triangle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            triangles.forEach(t => { t.update(); t.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Fungsi Download
        async function download() {
            const url = document.getElementById('url').value;
            const res = document.getElementById('result');
            if(!url) return;
            res.innerText = "Processing...";
            try {
                const response = await fetch(`https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if(data.video?.noWatermark) {
                    res.innerHTML = `<a href="${data.video.noWatermark}" target="_blank" style="color:#14F195; text-decoration:none;">Download Link Ready</a>`;
                } else {
                    res.innerText = "Gagal memproses.";
                }
            } catch(e) { res.innerText = "Error."; }
        }
    </script>
</body>
</html>
